<!DOCTYPE html>
<html lang="ar">
  <head>
    <meta charset="UTF-8" />
    <title>دخول غير مصرح</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap");
      body {
        background: linear-gradient(135deg, #ffd6d6 0%, #ffe9ec 100%);
        min-height: 100vh;
        margin: 0;
        font-family: "Cairo", Arial, Tahoma, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #232426;
      }
      .box {
        background: #fff;
        border-radius: 28px;
        box-shadow: 0 8px 40px rgba(255, 110, 110, 0.12);
        padding: 2.7rem 2.2rem 2rem 2.2rem;
        text-align: center;
        max-width: 410px;
        width: 95vw;
        animation: fade-in 1s cubic-bezier(0.22, 1, 0.36, 1);
      }
      @keyframes fade-in {
        from {
          opacity: 0;
          transform: translateY(40px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .icon-lock {
        width: 78px;
        height: 78px;
        border-radius: 50%;
        background: linear-gradient(135deg, #fd5e53 60%, #ffd6d6 100%);
        margin: 0 auto 18px auto;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 2px 20px rgba(253, 94, 83, 0.13);
        animation: pop 0.8s cubic-bezier(0.16, 1.19, 0.59, 1.13);
      }
      @keyframes pop {
        0% {
          transform: scale(0.7);
        }
        70% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }
      .icon-lock svg {
        width: 40px;
        height: 40px;
        color: #fff;
      }
      h1 {
        font-size: 2.7rem;
        margin: 0 0 8px 0;
        color: #fd5e53;
        font-weight: 900;
        letter-spacing: 1px;
        animation: slide-down 0.6s 0.15s cubic-bezier(0.23, 1.01, 0.66, 1.07) both;
      }
      @keyframes slide-down {
        from {
          opacity: 0;
          transform: translateY(-30px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .code-num {
        display: inline-block;
        background: #ffe3e3;
        color: #fd5e53;
        border-radius: 9px;
        padding: 0 10px;
        font-size: 1.1rem;
        margin-bottom: 6px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      p {
        font-size: 1.17rem;
        color: #464444;
        margin: 18px 0 27px 0;
      }
      a {
        background: linear-gradient(135deg, #fd5e53 60%, #fa6987 100%);
        color: #fff;
        text-decoration: none;
        font-size: 1.1rem;
        padding: 11px 30px;
        border-radius: 8px;
        font-weight: bold;
        box-shadow: 0 2px 10px rgba(253, 94, 83, 0.07);
        transition: background 0.16s, transform 0.18s;
        display: inline-block;
      }
      a:hover {
        background: linear-gradient(135deg, #fa6987 30%, #fd5e53 100%);
        transform: translateY(-2px) scale(1.03);
      }
      @media (max-width: 500px) {
        .box {
          padding: 2rem 0.7rem 1.2rem 0.7rem;
        }
        h1 {
          font-size: 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="box" dir="rtl">
      <div class="icon-lock">
        <!-- Animated Lock Icon SVG -->
        <svg viewBox="0 0 48 48" fill="none">
          <rect x="12" y="22" width="24" height="16" rx="5" stroke="white" stroke-width="2.2" fill="none" />
          <path d="M24 30v4" stroke="white" stroke-width="2.5" stroke-linecap="round" />
          <circle cx="24" cy="28" r="2.2" fill="white" />
          <path d="M16 22v-5a8 8 0 0 1 16 0v5" stroke="white" stroke-width="2.2" fill="none" />
        </svg>
      </div>
      <div class="code-num">401</div>
      <h1>دخول غير مصرح</h1>
      <p>عذراً، لا تملك صلاحية الوصول إلى هذه الصفحة.</p>
    </div>
  </body>
</html>
